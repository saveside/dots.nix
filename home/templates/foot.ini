[colors]
# Main colors
foreground={{colors.on_surface.default.hex | strip}}
background=000000

# Cursor
cursor-text={{colors.on_surface.default.hex | strip}}
cursor-color={{colors.on_surface_variant.default.hex | strip}}

# Selection
selection-foreground={{colors.background.default.hex | strip}}
selection-background={{colors.primary.default.hex | strip}}

# Search Matches
search-box-no-match={{colors.surface_variant.default.hex | strip}} {{colors.tertiary.default.hex | strip}}
search-box-match={{colors.surface_variant.default.hex | strip}} {{colors.primary.default.hex | strip}}

# URL/Hints
urls={{colors.secondary.default.hex | strip}}

# Normal Colors (regular0 - regular7)
regular0=181818
regular1={{colors.error.default.hex | strip}}
regular2={{colors.primary.default.hex | strip}}
regular3={{colors.inverse_primary.default.hex | strip}}
regular4={{colors.primary.default.hex | strip}}
regular5={{colors.tertiary.default.hex | strip}}
regular6={{colors.secondary.default.hex | strip}}
regular7=BAC2DE

# Bright Colors (bright0 - bright7)
bright0=585B70
bright1=F38BA8
bright2=A6E3A1
bright3=F9E2AF
bright4=89B4FA
bright5=F5C2E7
bright6=94E2D5
bright7=A6ADC8

# Dim Colors (dim0 - dim7)
dim0=45475A
dim1=F38BA8
dim2=A6E3A1
dim3=F9E2AF
dim4=89B4FA
dim5=F5C2E7
dim6=94E2D5
dim7=BAC2DE
